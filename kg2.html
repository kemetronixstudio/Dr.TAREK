<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KG2 English Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="quiz-body" data-page="quiz" data-grade="kg2">
  <div class="bg-decor decor-confetti"></div>
  <main class="container page-wrap">
    <section class="top-utility-row">
      <div class="lang-switch" role="group" aria-label="Language switch">
        <button class="lang-btn active" data-lang="en" type="button">English</button>
        <button class="lang-btn" data-lang="ar" type="button">العربية</button>
      </div>
    </section>

    <header class="card top-bar">
      <a href="index.html" class="secondary-btn" data-i18n="homeBtn">⬅ Home</a>
      <div>
        <h1 class="page-title">KG2 English Quiz</h1>
        <p class="page-subtitle" data-i18n="kg2Subtitle">Stronger English questions for growing learners.</p>
      </div>
    </header>

    <section id="setupCard" class="card section-card pop-in">
      <div class="setup-step">
        <span class="step-pill" data-i18n="step1">Step 1</span>
        <h2 data-i18n="enterName">Enter Student Name</h2>
        <input id="studentName" class="text-input" type="text" maxlength="40" placeholder="Type student name" data-i18n-placeholder="studentPlaceholder" />
        <button id="goToLevelBtn" class="primary-btn" data-i18n="continueBtn">Continue</button>
      </div>

      <div id="levelChooser" class="setup-step hidden">
        <span class="step-pill" data-i18n="step2">Step 2</span>
        <h2 data-i18n="chooseLevel">Choose Quiz Level</h2>
        <p class="helper-text" data-i18n="pickQuestionCount">Pick how many questions you want.</p>
        <div class="mini-level-grid">
          <button class="level-btn" data-count="10" type="button"><span data-i18n="level1">Level 1</span><br><small data-i18n="q10">10 Questions</small></button>
          <button class="level-btn" data-count="20" type="button"><span data-i18n="level2">Level 2</span><br><small data-i18n="q20">20 Questions</small></button>
          <button class="level-btn" data-count="30" type="button"><span data-i18n="level3">Level 3</span><br><small data-i18n="q30">30 Questions</small></button>
        </div>
      </div>
    </section>

    <section id="quizSection" class="hidden">
      <div class="status-grid">
        <div class="card status-box"><span data-i18n="studentLabel">Student</span><strong id="studentPreview">-</strong></div>
        <div class="card status-box"><span data-i18n="quizLabel">Quiz</span><strong id="quizLevelLabel">-</strong></div>
        <div class="card status-box"><span data-i18n="questionLabel">Question</span><strong><span id="questionIndex">0</span>/<span id="questionTotal">0</span></strong></div>
        <div class="card status-box timer-box"><span data-i18n="timeLeft">Time Left</span><strong id="timerValue">15</strong></div>
        <div class="card status-box"><span data-i18n="scoreLabel">Score</span><strong id="scoreValue">0</strong></div>
      </div>

      <article class="card quiz-card-main">
        <div class="quiz-heading-row">
          <span id="skillBadge" class="step-pill">Vocabulary</span>
          <span id="questionTypeBadge" class="soft-badge">Picture Question</span>
        </div>
        <h2 id="questionText" class="question-text">Question text</h2>
        <div id="questionImageWrap" class="image-card-wrap hidden">
          <img id="questionImage" class="question-image" src="" alt="Question visual" />
        </div>
        <div id="optionsWrap" class="options-grid"></div>
        <div class="quiz-controls-row">
          <label class="auto-next-toggle">
            <input id="autoNextToggle" type="checkbox" checked />
            <span data-i18n="autoNext">Auto next after answer</span>
          </label>
          <button id="nextBtn" class="primary-btn hidden next-btn" data-i18n="nextQuestion">Next Question</button>
        </div>
      </article>
    </section>
  </main>
  <script charset="UTF-8" src="script.js"></script>
</body>
</html>
