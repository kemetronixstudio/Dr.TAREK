<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Cairo:wght@400;600;700;800&family=Noto+Naskh+Arabic:wght@600;700&display=swap" rel="stylesheet"><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#ffd54f"><link rel="stylesheet" href="style.css"><title>Homework</title></head><body data-page="homework">
<div class="floating-shapes"></div>
<header class="top-shell subpage-top-shell top-shell-inline"><div class="header-left"><a class="back-link top-home-link" href="index.html">⬅ Home</a></div><div class="header-center"><div class="teacher-topline">Dr. TAREK ABDALAZIZ 📞 01032188008</div></div><div class="header-right"><a class="tiny-admin-link" href="admin.html" title="Teacher Area">★</a></div></header>
<main class="container page-wrap">
  <section class="card setup-card" id="homeworkStartCard">
    <div class="setup-grid">
      <div>
        <span class="badge-pill">Homework</span>
        <h1>Homework With Dr. Tarek</h1>
        <p>Choose your grade and class to open available homework.</p>
        <div class="student-form-box">
          <input id="homeworkStudentName" placeholder="Student name" maxlength="60">
          <input id="homeworkStudentId" placeholder="Student ID (optional)" maxlength="40">
          <select id="homeworkStudentGrade"><option value="KG1">KG1</option><option value="KG2">KG2</option><option value="GRADE1">Grade 1</option><option value="GRADE2">Grade 2</option><option value="GRADE3">Grade 3</option><option value="GRADE4">Grade 4</option><option value="GRADE5">Grade 5</option><option value="GRADE6">Grade 6</option></select>
          <input id="homeworkStudentClass" placeholder="Class name">
          <button class="main-btn" id="loadHomeworkBtn" type="button">Show Homework</button>
          <div id="homeworkStatus" class="muted-note"></div>
        </div>
        <div id="homeworkAvailableList" class="stored-questions question-editor-list"></div>
      </div>
    </div>
  </section>
  <section id="homeworkQuizSection" class="hidden">
    <div class="status-grid">
      <div class="status-card card"><span>Student</span><strong id="homeworkStudentPreview">-</strong></div>
      <div class="status-card card"><span>Homework</span><strong id="homeworkTitlePreview">-</strong></div>
      <div class="status-card card"><span>Question</span><strong id="homeworkQuestionProgress">1 / 1</strong></div>
      <div class="status-card card timer-card"><span>Time Left</span><strong id="homeworkTimerValue">-</strong></div>
      <div class="status-card card"><span>Answered</span><strong id="homeworkAnsweredValue">0</strong></div>
    </div>
    <section class="card quiz-card-main">
      <div class="quiz-badges"><span class="badge-pill small" id="homeworkClassBadge"></span><span class="badge-pill small secondary" id="homeworkDateBadge"></span></div>
      <h2 id="homeworkQuestionText">Question</h2>
      <div id="homeworkOptionsWrap" class="options-grid"></div>
      <div class="next-row"><button class="main-btn" id="homeworkNextBtn" type="button">Next Question</button></div>
    </section>
  </section>
  <section id="homeworkDoneSection" class="card hidden">
    <h2>Homework submitted</h2>
    <p id="homeworkDoneText">Your homework has been sent.</p>
    <a class="main-btn" href="homework.html">Open another homework</a>
  </section>
</main>
<script src="student-cloud-client.js"></script><script src="script.js"></script><script src="homework.js"></script></body></html>
